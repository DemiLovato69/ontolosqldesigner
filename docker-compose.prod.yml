services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
            network: host
        container_name: php
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
            - vendor_data:/var/www/html/backend/vendor
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REVERB_INTERNAL_HOST: reverb
            REVERB_INTERNAL_PORT: 6001
            REVERB_INTERNAL_SCHEME: http


    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
            network: host
        container_name: queue
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
            - vendor_data:/var/www/html/backend/vendor
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REVERB_INTERNAL_HOST: reverb
            REVERB_INTERNAL_PORT: 6001
            REVERB_INTERNAL_SCHEME: http
        command: ["php", "artisan", "queue:work", "database", "--queue=diagrams", "--tries=1", "--sleep=3", "--timeout=1800"]

    queue-emails:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
            network: host
        container_name: queue-emails
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
            - vendor_data:/var/www/html/backend/vendor
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
        command: ["php", "artisan", "queue:work", "--queue=emails", "--tries=5", "--sleep=3", "--timeout=30"]

    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
            network: host
        container_name: reverb
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
            - vendor_data:/var/www/html/backend/vendor
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
        command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001", "--no-interaction"]

    node:
        build:
            context: .
            dockerfile: docker/node/Dockerfile.prod
            network: host
            args:
                VITE_REVERB_APP_KEY: snydiagram-key
                VITE_REVERB_HOST: sql-designer.com
                VITE_REVERB_PORT: 443
                VITE_REVERB_SCHEME: https
        container_name: node
        volumes:
            - ./backend/public:/var/www/html/frontend/public
        working_dir: /var/www/html/frontend
        networks:
            - snydiagram_network
        command: sh -c "npm run build"
        restart: no

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        command: sh -c "mkdir -p /tmp/nginx_fastcgi_cache && nginx -g 'daemon off;'"
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./backend:/var/www/html/backend:ro
            - ./docker/nginx/certs:/etc/nginx/certs:ro
            - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            php:
                condition: service_started
            node:
                condition: service_completed_successfully
        networks:
            - snydiagram_network

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - snydiagram_network

    postgres:
        image: postgres:15
        container_name: postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - snydiagram_network

volumes:
    pgdata:
    vendor_data:

networks:
    snydiagram_network:
        driver: bridge
