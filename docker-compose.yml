services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: php
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REVERB_INTERNAL_HOST: reverb
            REVERB_INTERNAL_PORT: 6001
            REVERB_INTERNAL_SCHEME: http

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: queue
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            REVERB_INTERNAL_HOST: reverb
            REVERB_INTERNAL_PORT: 6001
            REVERB_INTERNAL_SCHEME: http
        command: ["php", "artisan", "queue:work", "database", "--queue=diagrams", "--tries=1", "--sleep=3", "--timeout=1800"]

    queue-emails:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: queue-emails
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
        command: ["php", "artisan", "queue:work", "--queue=emails", "--tries=3", "--sleep=3", "--timeout=30"]

    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: reverb
        restart: unless-stopped
        working_dir: /var/www/html/backend
        volumes:
            - ./backend:/var/www/html/backend
        networks:
            - snydiagram_network
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
        command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001", "--no-interaction"]

    node:
        image: node:18-alpine
        container_name: node
        volumes:
            - ./frontend:/var/www/html/frontend
            - ./backend/public:/var/www/html/backend/public
        working_dir: /var/www/html/frontend
        ports:
            - "127.0.0.1:5173:5173"
        networks:
            - snydiagram_network
        env_file:
            - ./backend/.env
        environment:
            - APP_URL=${APP_URL}
        command: sh -c "npm install && npm run dev -- --host"

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8080:80"
        volumes:
            - ./backend:/var/www/html/backend
            - ./frontend:/var/www/html/frontend
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
            - node
        networks:
            - snydiagram_network

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - snydiagram_network

    postgres:
        image: postgres:15
        container_name: postgres
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "127.0.0.1:5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - snydiagram_network

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
        ports:
            - "127.0.0.1:8081:80"
        depends_on:
            - postgres
        networks:
            - snydiagram_network

volumes:
    pgdata:

networks:
    snydiagram_network:
        driver: bridge
