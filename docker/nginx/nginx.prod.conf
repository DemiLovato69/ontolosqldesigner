# ── FastCGI page cache (home + blog pages) ────────────────────────────────────
fastcgi_cache_path /tmp/nginx_fastcgi_cache levels=1:2 keys_zone=FASTCGI:10m inactive=1h max_size=50m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";
fastcgi_cache_use_stale error timeout invalid_header http_500 http_503;
fastcgi_cache_lock on;

# Skip cache for API routes; cache everything else (HTML pages are user-agnostic)
map $request_uri $no_fastcgi_cache {
    default     "";
    ~^/api/     1;
}

server {
    listen 80;
    server_name sql-designer.com www.sql-designer.com;
    return 301 https://sql-designer.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.sql-designer.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://sql-designer.com$request_uri;
}

server {
    listen 443 ssl;
    server_name sql-designer.com;
    root /var/www/html/backend/public;
    index index.php;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.ahrefs.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' wss://sql-designer.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://analytics.ahrefs.com" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss text/javascript image/svg+xml;

    # ── Reverb WebSocket proxy ────────────────────────────────────────────────
    location /app/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $reverb_upstream reverb:6001;
        proxy_pass http://$reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Hashed Vite build assets (cache forever — content-hashed filenames) ──
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Static images (cache 1 year) ─────────────────────────────────────────
    location ^~ /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Block access to dotfiles (.env, .git, etc.) ───────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block direct access to sensitive Laravel directories ──────────────────
    location ~ ^/(storage/(?!app/public)|bootstrap/cache) {
        deny all;
        return 404;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_upstream php:9000;
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_hide_header X-Powered-By;

        fastcgi_cache FASTCGI;
        fastcgi_cache_valid 200 1h;
        fastcgi_cache_bypass $no_fastcgi_cache $http_authorization $http_cache_control;
        fastcgi_no_cache $no_fastcgi_cache $http_authorization;
    }

    # ── SPA / Laravel catch-all ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
